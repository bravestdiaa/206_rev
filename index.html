function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

// دالة لتجهيز وعشوائية أسئلة الاختيارات
function getShuffledMCQData() {
    let data = JSON.parse(JSON.stringify(originalMCQData));
    
    // المجموعتان الأولى والثانية ثابتتان في مكانهما
    let group1 = data[0];
    let group2 = data[1];
    let rest = data.slice(2);

    // عشوائية الخيارات لجميع الأسئلة
    [group1, group2].forEach(g => {
        g.questions.forEach(q => shuffleOptions(q));
    });
    
    rest.forEach(q => shuffleOptions(q));

    // عشوائية ترتيب الأسئلة من الثالث للنهاية
    shuffleArray(rest);

    // تجميع وبناء المصفوفة النهائية وتسوية البيانات
    let flatData = [];
    let qNumber = 1;
    
    // معالجة المجموعة الأولى
    flatData.push({ isPreamble: true, qNum: qNumber, textEn: group1.preambleEn, textAr: group1.preambleAr });
    group1.questions.forEach((q, i) => {
        // تنسيق الترقيم ليكون 1 - a, 1 - b وهكذا
        q.displayNum = `${qNumber} - ${String.fromCharCode(97 + i)}`; 
        q.isTranslated = false;
        q.userSelected = null;
        q.showAnswer = false;
        flatData.push(q);
    });
    qNumber++;

    // معالجة المجموعة الثانية
    flatData.push({ isPreamble: true, qNum: qNumber, textEn: group2.preambleEn, textAr: group2.preambleAr });
    group2.questions.forEach((q, i) => {
        q.displayNum = `${qNumber} - ${String.fromCharCode(97 + i)}`;
        q.isTranslated = false;
        q.userSelected = null;
        q.showAnswer = false;
        flatData.push(q);
    });
    qNumber++;

    // معالجة باقي الأسئلة
    rest.forEach(q => {
        q.displayNum = qNumber;
        q.isTranslated = false;
        q.userSelected = null;
        q.showAnswer = false;
        flatData.push(q);
        qNumber++;
    });

    return flatData;
}

function shuffleOptions(qObj) {
    let opts = qObj.optionsEn.map((optEn, i) => ({
        en: optEn,
        ar: qObj.optionsAr[i],
        isCorrect: (i === qObj.ansIndex)
    }));
    shuffleArray(opts);
    qObj.optionsEn = opts.map(o => o.en);
    qObj.optionsAr = opts.map(o => o.ar);
    qObj.ansIndex = opts.findIndex(o => o.isCorrect);
}

// دالة لتجهيز وعشوائية أسئلة الصح والخطأ
function getShuffledTFData() {
    let data = JSON.parse(JSON.stringify(originalTFData));
    shuffleArray(data);
    return data.map((q, i) => ({
        ...q,
        displayNum: i + 1,
        isTranslated: false,
        userSelected: null,
        showAnswer: false,
        showNote: false
    }));
}

function generateQuestionCard(q, index) {
    const isTranslated = q.isTranslated;
    const directionClass = isTranslated ? 'rtl' : 'ltr';
    const textAlignment = isTranslated ? 'text-right' : 'text-left';
    
    let optionsHtml = '';
    
    if (currentQuiz === 'mcq') {
        q.optionsEn.forEach((optEn, optIdx) => {
            let optText = isTranslated ? q.optionsAr[optIdx] : optEn;
            let bgColor = "bg-gray-50 hover:bg-gray-100";
            let borderClass = "border-gray-200";
            let iconHtml = "";

            if (q.userSelected === optIdx) {
                bgColor = "bg-blue-100";
                borderClass = "border-blue-400";
            }
            if (q.showAnswer && q.ansIndex === optIdx) {
                bgColor = "bg-green-200";
                borderClass = "border-green-500";
                iconHtml = `<i class="fas fa-check-circle text-green-600 mx-2"></i>`;
            }

            optionsHtml += `
                <div onclick="selectOption(${index}, ${optIdx})" class="p-4 px-6 mb-2 border-2 ${borderClass} rounded-lg cursor-pointer transition-colors flex items-center ${bgColor}">
                    <span class="flex-1 ${textAlignment} ${directionClass} font-medium">${optText}</span>
                    ${iconHtml}
                </div>
            `;
        });
    } else {
        // إعدادات خيارات الصح والخطأ لتكون مشابهة لـ MCQ
        const tfOptions = [
            { val: true, textEn: "True", textAr: "صح (True)" },
            { val: false, textEn: "False", textAr: "خطأ (False)" }
        ];

        tfOptions.forEach(opt => {
            let optText = isTranslated ? opt.textAr : opt.textEn;
            let bgColor = "bg-gray-50 hover:bg-gray-100";
            let borderClass = "border-gray-200";
            let iconHtml = "";

            if (q.userSelected === opt.val) {
                bgColor = "bg-blue-100";
                borderClass = "border-blue-400";
            }

            if (q.showAnswer && q.ans === opt.val) {
                // تلوين الإجابة الصحيحة
                if (opt.val === true) {
                    bgColor = "bg-green-200";
                    borderClass = "border-green-500";
                    iconHtml = `<i class="fas fa-check-circle text-green-600 mx-2"></i>`;
                } else {
                    bgColor = "bg-red-200"; // أحمر إذا كانت False هي الإجابة الصحيحة

            optionsHtml += `

                    <span class="flex-1 ${textAlignment} ${directionClass} font-medium">${optText}</span>
                    ${iconHtml}

        });

                    ${q.displayNum}
                </div>
                <div class="${directionClass} ${textAlignment} flex-1 pt-1 text-lg font-semibold text-gray-800">
                    ${qText}
                </div>
            </div>
            
            <div class="pl-4 pr-4 space-y-2 mt-4">
                ${optionsHtml}
            </div>
            
            ${controlsHtml}
            ${noteHtml}
        </div>
    `;
}

// ================= تفاعلات المستخدم =================

function selectOption(qIndex, optIndex) {
    if(quizData[qIndex].showAnswer) return; // منع التغيير إذا كانت الإجابة ظاهرة للتقييم
    quizData[qIndex].userSelected = optIndex;
    updateQuestionCard(qIndex);
}

function selectTFOption(qIndex, val) {
    if(quizData[qIndex].showAnswer) return;
    quizData[qIndex].userSelected = val;
    updateQuestionCard(qIndex);
}

function toggleAnswer(qIndex) {
    quizData[qIndex].showAnswer = !quizData[qIndex].showAnswer;
    updateQuestionCard(qIndex);
}

function toggleTranslate(qIndex) {
    quizData[qIndex].isTranslated = !quizData[qIndex].isTranslated;
    updateQuestionCard(qIndex);
}

function toggleNoteTranslate(qIndex) {
    quizData[qIndex].showNote = !quizData[qIndex].showNote;
    updateQuestionCard(qIndex);
}

function clearSpecificAnswer(qIndex) {
    quizData[qIndex].userSelected = null;
    updateQuestionCard(qIndex);
}

function updateQuestionCard(qIndex) {
    const qDiv = document.getElementById(`q-${qIndex}`);
    if (qDiv) {
        qDiv.outerHTML = generateQuestionCard(quizData[qIndex], qIndex);
    }
}

function clearAllAnswers() {
    quizData.forEach(q => {
        if (!q.isPreamble) {
            q.userSelected = null;
            q.showAnswer = false;
        }
    });
    renderQuizView(currentQuiz === 'mcq' ? 'أسئلة الاختيار من متعدد (MCQ)' : 'أسئلة الصواب والخطأ (True/False)');
}

function evaluateAnswers() {
    let score = 0;
    let total = 0;
    
    quizData.forEach((q, index) => {
        if (q.isPreamble) return;
        total++;
        q.showAnswer = true; // كشف الإجابات بعد التقييم
        if (currentQuiz === 'mcq') {
            if (q.userSelected === q.ansIndex) score++;
        } else {
            if (q.userSelected === q.ans) score++;
        }
    });

    renderQuizView(currentQuiz === 'mcq' ? 'أسئلة الاختيار من متعدد (MCQ)' : 'أسئلة الصواب والخطأ (True/False)');
    
    // Show Modal
    const modal = document.getElementById('evalModal');
    const scoreText = document.getElementById('evalScore');
    const modalContent = document.getElementById('evalModalContent');
    const percentage = Math.round((score / total) * 100);
    
    scoreText.innerHTML = `لقد أجبت بشكل صحيح على <br><strong class="text-3xl text-blue-600">${score}</strong> من <strong class="text-xl">${total}</strong> <br><br> النسبة: %${percentage}`;
    
    if(percentage >= 85) { modalContent.classList.add('border-t-8', 'border-green-500'); }
    else if(percentage >= 50) { modalContent.classList.add('border-t-8', 'border-yellow-500'); }
    else { modalContent.classList.add('border-t-8', 'border-red-500'); }

    modal.classList.remove('hidden');
    setTimeout(() => {
        modalContent.classList.remove('scale-95');
        modalContent.classList.add('scale-100');
    }, 10);
}

function closeModal() {
    const modal = document.getElementById('evalModal');
    modal.classList.add('hidden');
}

// التمرير للأعلى
window.onscroll = function() {
    const btn = document.getElementById("scrollTopBtn");
    if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
        btn.style.display = "flex";
    } else {
        btn.style.display = "none";
    }
};

// بدء التطبيق
renderHome();

</script>
</body>
