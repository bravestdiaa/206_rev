            { group: 5, type: 'image', url: 'https://i.ibb.co/MknyCWPr/from-sh-4-3.png' },
            { group: 5, id: 's1_disc_2', text_en: "Discussion for Binary Logistic Regression:", text_ar: "مناقشة نموذج الانحدار اللوجستي الثنائي أعلاه:", isText: true, correct_en: "Model is significant. Glucose is a strong predictor. Age is significant at 0.05 but not 0.01.", correct_ar: `<div class="text-right">
        <h4 class="text-xl font-bold mb-3 border-b border-emerald-300 pb-2">مناقشة كاملة للنتائج</h4>
        <p class="mb-4">تم استخدام <strong>الانحدار اللوجستي الثنائي Binary Logistic Regression</strong> لدراسة تأثير متغيري <strong>Glucose</strong> و <strong>Age</strong> على احتمال الإصابة بمرض <strong>Diabetes</strong>. المتغير التابع هو <strong>Diabetes</strong> (0 = Not diabetic, 1 = diabetes).</p>
        
        <h5 class="text-lg font-bold mb-2 mt-4">1. معنوية النموذج ككل</h5>
        <p class="mb-2">من جدول <strong>Omnibus Tests of Model Coefficients</strong>: <span dir="ltr" class="font-mono bg-emerald-50 p-1 rounded inline-block">χ² = 38.217, df = 2, Sig. = .000</span></p>
        <p class="mb-4">النموذج ككل <strong>معنوي إحصائيًا بدرجة عالية</strong> (Sig < 0.01).</p>
        
        <h5 class="text-lg font-bold mb-2 mt-4">2. ملخص النموذج</h5>
        <ul class="list-disc list-inside mb-4">
            <li><strong>-2 Log likelihood</strong> = 156.629</li>
            <li><strong>Cox & Snell R Square</strong> = 0.225</li>
            <li><strong>Nagelkerke R Square</strong> = 0.309 (النموذج يفسر تقريبًا <strong>30.9%</strong> من التغير في احتمالية الإصابة)</li>
        </ul>
        
        <h5 class="text-lg font-bold mb-2 mt-4">3. جدول التصنيف Classification Table</h5>
        <p class="mb-2">النسبة الكلية للتصنيف الصحيح هي: <strong>73.3%</strong>.</p>
        <p class="mb-4">النموذج صنف بشكل صحيح 85 من غير المصابين (87.6%) و 25 من المصابين (47.2%). أي أن النموذج يميل إلى التنبؤ بفئة <strong>Not diabetic</strong> أكثر.</p>
        
        <h5 class="text-lg font-bold mb-2 mt-4">4. تفسير معاملات النموذج وتأثير المتغيرات</h5>
        <p class="mb-4 text-left font-mono bg-emerald-50 p-2 rounded" dir="ltr">log(p/(1-p)) = -5.819 + 0.032(Glucose) + 0.040(Age)</p>
        
        <p class="mb-1 font-bold text-emerald-800">تأثير Glucose:</p>
        <p class="mb-4"><strong>B = 0.032</strong> و <strong>Sig. = .000</strong>. له تأثير معنوي إحصائيًا. قيمة <strong>Exp(B)=1.032</strong> تعني زيادة وحدة جلوكوز تزيد أرجحية الإصابة (Odds) بمقدار <strong>1.032 مرة</strong> (زيادة 3.2%). العلاقة طردية.</p>
        
        <p class="mb-1 font-bold text-emerald-800">تأثير Age:</p>

            <li>دقة التصنيف الكلية <strong>73.3%</strong>.</li>
            <li><strong>Glucose</strong> هو المتغير الأقوى في النموذج يليه <strong>Age</strong>.</li>
        </ul>
    </div>` },

            { group: 6, id: 's1_disc_3', text_en: "Discuss the results of the Kolmogorov-Smirnov test:", text_ar: "ناقش نتائج اختبار Kolmogorov-Smirnov أعلاه:", isText: true, correct_en: "The data follows a normal distribution since Sig (0.165) > 0.05.", correct_ar: `<div class="text-right">

        <h5 class="text-lg font-bold mb-2 mt-4">4. القرار الإحصائي والاستنتاج</h5>

        // إرجاع العناصر المعروضة حالياً لتسهيل عمليات (تصحيح/مسح)
        function getCurrentViewItems() {
            if (currentSectionData === section1Data) {
                return currentSectionData.filter(item => item.group === currentS1Step);
            }
            return currentSectionData;
        }

        function loadSection(secId) {
            document.getElementById('back-btn').classList.remove('hidden');
            const main = document.getElementById('app-content');
            
            let headerTitle, headerColor;
            if(secId === 's1') { 
                currentSectionData = section1Data; 
                headerTitle = "القسم الأول: التطبيقات العملية وصور SPSS"; 
                headerColor = "blue"; 
                currentS1Step = 1; // إعادة التعيين ليعرض المجموعة الأولى فقط
            }
            if(secId === 's2') { currentSectionData = section2Data; headerTitle = "القسم الثاني: أسئلة الصح والخطأ (T/F)"; headerColor = "emerald"; }
            if(secId === 's3') { currentSectionData = section3Data; headerTitle = "القسم الثالث: أسئلة الاختيار من متعدد"; headerColor = "purple"; }

            let html = `
                <div class="max-w-4xl mx-auto px-4 py-8 animate-slide-up">
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 mb-8 overflow-hidden">
                        <div class="h-3 bg-${headerColor}-500 w-full"></div>
                        <div class="p-6">
                            <h2 class="text-2xl font-bold text-slate-800">${headerTitle}</h2>
                            <p class="text-slate-500 mt-2">اختر الإجابة واستخدم أزرار الترجمة والتحقق للتأكد من صحة معلوماتك.</p>
                        </div>
                    </div>
                    <div id="questions-container" class="space-y-6"></div>
                </div>
            `;
            main.innerHTML = html;
            renderQuestionsList();
        }

        // دالة التقدم للمجموعة التالية في القسم الأول
        window.nextS1Step = function() {
            if (currentS1Step < 7) {
                currentS1Step++;
                renderQuestionsList();
                scrollToTop();
            }
        };

        // دالة العودة للمجموعة السابقة
        window.prevS1Step = function() {
            if (currentS1Step > 1) {
                currentS1Step--;
                renderQuestionsList();
                scrollToTop();
            }
        };

        // التمرير لأعلى عند تغيير المجموعة
        function scrollToTop() {
            setTimeout(() => {
                const container = document.getElementById('questions-container');
                if (container) {
                    const y = container.getBoundingClientRect().top + window.scrollY - 100;
                    window.scrollTo({ top: y, behavior: 'smooth' });
                }
            }, 50);
        }

        // أزرار التحكم السفلية (تصحيح كل الأسئلة - مسح - التالي/السابق)
        function getBottomControls() {
            let out = '<div class="mt-8 mb-4 animate-fade-in pb-4 border-t border-slate-200 pt-8">';
            
            // منطقة عرض النتيجة التلقائية
            out += `<div id="score-display" class="hidden"></div>`;

            out += '<div class="flex flex-wrap justify-center gap-4">';
            
            // زر السابق للقسم الأول
            if (currentSectionData === section1Data && currentS1Step > 1) {
                out += `
                    <button onclick="prevS1Step()" class="flex items-center gap-2 px-6 py-3 bg-slate-200 text-slate-700 rounded-xl font-bold shadow hover:bg-slate-300 transition-all">
                        <i data-lucide="arrow-right-circle" class="w-5 h-5"></i>
                        السابق
                    </button>
                `;
            }

            // أزرار التصحيح والمسح العامة
            out += `
                <button onclick="checkAllCurrent()" class="flex items-center gap-2 px-6 py-3 bg-emerald-600 text-white rounded-xl font-bold shadow-lg hover:bg-emerald-700 transition-all hover:-translate-y-1">
                    <i data-lucide="check-square" class="w-5 h-5"></i>
                    تصحيح الإجابات
                </button>
                
                <button onclick="clearAllCurrent()" class="flex items-center gap-2 px-6 py-3 bg-red-50 text-red-600 border border-red-200 rounded-xl font-bold shadow-sm hover:bg-red-100 transition-all">
                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                    مسح الإجابات
                </button>
            `;

            // زر التالي للقسم الأول
            if (currentSectionData === section1Data && currentS1Step < 7) {
                out += `
                    <button onclick="nextS1Step()" class="flex items-center gap-2 px-6 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg hover:bg-blue-700 transition-all transform hover:-translate-y-1">
                        المجموعة التالية
                        <i data-lucide="arrow-left-circle" class="w-5 h-5"></i>
                    </button>
                `;
            }
            
            out += '</div></div>';
            return out;
        }

        // تصحيح كل الأسئلة في الصفحة الحالية
        window.checkAllCurrent = function() {
            const items = getCurrentViewItems();
            items.forEach(item => {
                if (item.id && appState[item.id]) {
                    appState[item.id].showAns = true;
                }
            });
            renderQuestionsList();
            
            // النزول برفق لمشاهدة النتيجة
            setTimeout(() => {
                const scoreDiv = document.getElementById('score-display');
                if(scoreDiv && !scoreDiv.classList.contains('hidden')) {
                    scoreDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, 100);
        }

        // مسح كل الإجابات في الصفحة الحالية
        window.clearAllCurrent = function() {
            const items = getCurrentViewItems();
            items.forEach(item => {
                if (item.id && appState[item.id]) {
                    appState[item.id].selected = null;
                    appState[item.id].showAns = false;
                }
            });
            renderQuestionsList();
            scrollToTop();
        }

        // تحديث وإظهار النتيجة عند فتح كافة الإجابات
        function updateScoreDisplay() {
            const items = getCurrentViewItems();
            let totalMCQ = 0;
            let correctCount = 0;
            let allRevealed = true;
            let hasQuestions = false;

            items.forEach(item => {
                if (item.options) {
                    totalMCQ++;
                    hasQuestions = true;
                    if (appState[item.id].selected === item.correct_en) correctCount++;
                    if (!appState[item.id].showAns) allRevealed = false;
                } else if (item.isText) {
                    hasQuestions = true;
                    if (!appState[item.id].showAns) allRevealed = false;
                }
            });

            const scoreDiv = document.getElementById('score-display');
            if (scoreDiv) {
                if (allRevealed && hasQuestions) {
                    scoreDiv.classList.remove('hidden');
                    if (totalMCQ > 0) {
                        const percentage = Math.round((correctCount / totalMCQ) * 100);
                        let bgClass = percentage >= 80 ? 'bg-emerald-100 text-emerald-800 border-emerald-300' : 
                                      percentage >= 50 ? 'bg-amber-100 text-amber-800 border-amber-300' : 
                                      'bg-red-100 text-red-800 border-red-300';
                        
                        scoreDiv.className = `mb-6 p-5 rounded-xl text-center font-bold text-lg border animate-fade-in shadow-sm ${bgClass}`;
                        scoreDiv.innerHTML = `
                            النتيجة التلقائية: ${correctCount} إجابة صحيحة من أصل ${totalMCQ} أسئلة موضوعية (${percentage}%) 
                            <br> 
                            <span class="text-sm font-normal mt-2 block text-opacity-80">الأسئلة المقالية أو الاستنتاجية تتطلب مراجعتك الذاتية للحل النموذجي.</span>
                        `;
                    } else {
                        scoreDiv.className = 'mb-6 p-5 rounded-xl text-center font-bold text-lg bg-blue-100 text-blue-800 border border-blue-300 animate-fade-in shadow-sm';
                        scoreDiv.innerHTML = `لقد قمت بإظهار جميع الإجابات. يرجى مراجعة الحلول النموذجية للأسئلة المقالية لتقييم نفسك.`;
                    }
                } else {
                    scoreDiv.classList.add('hidden');
                }
            }
        }

        // عرض قائمة الأسئلة
        function renderQuestionsList() {
            const container = document.getElementById('questions-container');
            let html = '';
            
            const currentItems = getCurrentViewItems();
            html = currentItems.map((item, index) => renderItem(item, index)).join('');
            
            // إضافة أزرار التحكم بالأسفل
            html += getBottomControls();
            
            container.innerHTML = html;
            lucide.createIcons();
            updateScoreDisplay();
        }

        function updateSingleItemDOM(id) {
            const item = currentSectionData.find(i => i.id === id);
            const el = document.getElementById(`card-${id}`);
            if(el && item) {
                el.outerHTML = renderItem(item, 0); 
                lucide.createIcons({ root: document.getElementById(`card-${id}`) });
                updateScoreDisplay(); // تحديث النتيجة إذا فتح جميع الإجابات تدريجياً
            }
        }

        // بناء HTML لكل عنصر (صورة، عنوان، أو سؤال)
        function renderItem(item, index) {
            if(item.type === 'image') {
                return `
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 overflow-hidden flex justify-center animate-fade-in mb-6 mt-6">
                        <img src="${item.url}" alt="Attachment" class="max-w-full h-auto rounded border border-slate-100">
                    </div>
                `;
            }
            if(item.type === 'title') {
                return `
                    <div class="bg-slate-800 text-white p-5 rounded-xl shadow-sm font-bold text-xl text-center en-text leading-relaxed animate-fade-in mt-10 mb-6" dir="ltr">
                        ${item.text}
                        ${item.text_ar ? `<div class="font-arabic text-lg mt-2 text-slate-300" dir="rtl">${item.text_ar}</div>` : ''}
                    </div>
                `;
            }

            // إنه سؤال تفاعلي
            const s = appState[item.id];
            
            // خيارات السؤال
            let optionsHtml = '';
            if(item.options) {
                optionsHtml = item.options.map(opt => {
                    const isSelected = s.selected === opt.en;
                    const isCorrect = opt.en === item.correct_en;
                    
                    let btnClass = "p-4 border-2 rounded-xl cursor-pointer transition-all duration-200 flex items-center gap-3 w-full text-left bg-white border-slate-200 ";
                    let iconHtml = '<div class="w-5 h-5 rounded-full border-2 border-slate-300 flex-shrink-0 flex items-center justify-center"></div>';

                    if (s.showAns) {
                        if (isSelected && isCorrect) {
                            btnClass = "p-4 border-2 rounded-xl flex items-center gap-3 w-full text-left bg-green-50 border-green-500 text-green-900 font-medium";
                            iconHtml = '<i data-lucide="check-circle-2" class="w-5 h-5 text-green-600 flex-shrink-0"></i>';
                        } else if (isSelected && !isCorrect) {
                            btnClass = "p-4 border-2 rounded-xl flex items-center gap-3 w-full text-left bg-red-50 border-red-500 text-red-900 font-medium";
                            iconHtml = '<i data-lucide="x-circle" class="w-5 h-5 text-red-600 flex-shrink-0"></i>';
                        } else if (isCorrect) {
                            btnClass = "p-4 border-2 rounded-xl flex items-center gap-3 w-full text-left bg-green-50/50 border-green-300 text-green-800 opacity-80";
                            iconHtml = '<i data-lucide="check" class="w-5 h-5 text-green-500 flex-shrink-0"></i>';
                        } else {
                            btnClass += " opacity-50";
                        }
                    } else {
                        if (isSelected) {
                            btnClass = "p-4 border-2 rounded-xl cursor-pointer transition-all duration-200 flex items-center gap-3 w-full text-left bg-indigo-50 border-indigo-500 shadow-sm";
                            iconHtml = '<div class="w-5 h-5 rounded-full border-2 border-indigo-600 flex-shrink-0 flex items-center justify-center"><div class="w-2.5 h-2.5 bg-indigo-600 rounded-full"></div></div>';
                        } else {
                            btnClass += " hover:bg-slate-50 hover:border-slate-300";
                        }
                    }

                    return `
                        <button onclick="selectOption('${item.id}', '${escapeHTML(opt.en)}')" class="${btnClass}" ${s.showAns ? 'disabled' : ''}>
                            ${iconHtml}
                            <div class="flex flex-col">
                                <span class="en-text text-[1.05rem]">${escapeHTML(opt.en)}</span>
                                ${opt.ar && s.showTrans ? `<span class="text-sm text-slate-500 mt-1 font-arabic" dir="rtl">${escapeHTML(opt.ar)}</span>` : ''}
                            </div>
                        </button>
                    `;
                }).join('');
            } else if(item.isText) {
                // الأسئلة النصية (أكمل والمناقشات)
                optionsHtml = `<div class="p-4 bg-slate-50 border border-slate-200 rounded-xl text-slate-500 italic text-center text-sm mb-2">أجب في ذهنك ثم اضغط (تصحيح أو إظهار الإجابة) للمقارنة المباشرة.</div>`;
            }

            // صندوق عرض الإجابة الصحيحة
            let answerBox = '';
            if (s.showAns) {
                answerBox = `
                    <div class="mt-5 p-5 bg-emerald-50 border border-emerald-200 rounded-xl animate-fade-in text-emerald-900">
                        <div class="flex items-start gap-3 mb-2">
                            <i data-lucide="info" class="w-5 h-5 mt-0.5 text-emerald-600 flex-shrink-0"></i>
                            <div class="flex flex-col w-full">
                                <span class="font-bold en-text text-lg" dir="ltr">Correct Answer: ${item.correct_en}</span>
                                ${s.showTrans && item.correct_ar ? `<div class="mt-3 text-emerald-900 bg-emerald-100/50 p-3 rounded-lg border border-emerald-200 shadow-sm leading-relaxed">${item.correct_ar}</div>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }

            return `
                <div id="card-${item.id}" class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 transition-all animate-slide-up mb-6">
                    <!-- رأس السؤال -->
                    <div class="mb-4">
                        <h3 class="text-lg font-bold text-slate-800 leading-relaxed en-text mb-2" dir="ltr" style="text-align: left;">
                            ${item.text_en}
                        </h3>
                        ${s.showTrans ? `
                            <div class="bg-blue-50 text-blue-900 p-3 rounded-lg text-lg border border-blue-100 animate-fade-in">
                                ${item.text_ar}
                            </div>
                        ` : ''}
                    </div>

                    <!-- الخيارات -->
                    <div class="space-y-3 mt-5" dir="ltr">
                        ${optionsHtml}
                    </div>

                    <!-- الأزرار السفلية -->
                    <div class="flex flex-wrap items-center gap-3 mt-6 pt-5 border-t border-slate-100">
                        <button onclick="toggleTrans('${item.id}')" class="flex items-center gap-2 px-4 py-2 text-sm font-bold text-blue-700 bg-blue-50 rounded-lg hover:bg-blue-100 transition-colors">
                            <i data-lucide="languages" class="w-4 h-4"></i>
                            ${s.showTrans ? 'إخفاء الترجمة' : 'ترجمة / توضيح'}
                        </button>

                        <button onclick="toggleAns('${item.id}')" class="flex items-center gap-2 px-4 py-2 text-sm font-bold rounded-lg transition-colors ${s.showAns ? 'text-slate-700 bg-slate-100 hover:bg-slate-200' : 'text-indigo-700 bg-indigo-50 hover:bg-indigo-100'}">
                            <i data-lucide="${s.showAns ? 'eye-off' : 'eye'}" class="w-4 h-4"></i>
                            ${s.showAns ? 'إخفاء الإجابة' : 'إظهار الإجابة'}
                        </button>

                        ${s.selected && !s.showAns && item.options ? `
                        <button onclick="clearOpt('${item.id}')" class="flex items-center gap-2 px-4 py-2 text-sm font-bold text-slate-600 bg-white border border-slate-300 rounded-lg hover:bg-slate-50 transition-colors mr-auto">
                            <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
                            مسح
                        </button>` : ''}
                    </div>

                    <!-- الإجابة الصحيحة -->
                    ${answerBox}
                </div>
            `;
        }

        // ==========================================
        // 4. دوال التفاعل مع المستخدم وإعدادات النافذة
        // ==========================================
        window.selectOption = function(id, opt) {
            if(!appState[id].showAns) {
                appState[id].selected = opt;
                updateSingleItemDOM(id);
            }
        }
        window.toggleAns = function(id) {
            appState[id].showAns = !appState[id].showAns;
            updateSingleItemDOM(id);
        }
        window.toggleTrans = function(id) {
            appState[id].showTrans = !appState[id].showTrans;
            updateSingleItemDOM(id);
        }
        window.clearOpt = function(id) {
            appState[id].selected = null;
            updateSingleItemDOM(id);
        }

        // إظهار/إخفاء زر العودة للأعلى حسب التمرير
        window.addEventListener('scroll', () => {
            const btn = document.getElementById('scrollToTopBtn');
            if (btn) {
                if (window.scrollY > 300) {
                    btn.classList.remove('opacity-0', 'pointer-events-none');
                } else {
                    btn.classList.add('opacity-0', 'pointer-events-none');
                }
            }
        });

        // تشغيل صفحة الهبوط فور تحميل الصفحة
        goHome();
    </script>
</body>
</html>
